name: Daily AI Content Agent

on:
  schedule:
    # Runs at 11:30 AM UTC every day (5:00 PM IST)
    - cron: '30 11 * * *'
  workflow_dispatch: # This adds a "Run Now" button on GitHub so you can test it manually!

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    # Needs permission to push code back to your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run AI Agent
        run: node index.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          WEBSITE_API_URL: ${{ secrets.WEBSITE_API_URL }}

      - name: Commit and Push generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🤖 Auto-generated Daily Post" || echo "No changes to commit"
          git push

      - name: Push post to Content Publisher website (Vercel)
        run: |
          DATE=$(date -u +%Y-%m-%d)
          POST_FILE="data/posts/${DATE}.json"

          if [ ! -f "$POST_FILE" ]; then
            echo "No post file found for today (${POST_FILE}). Skipping."
            exit 0
          fi

          echo "Found post: $POST_FILE"

          git clone https://x-access-token:${{ secrets.CONTENT_PUBLISHER_PAT }}@github.com/RaizianOfficial/content-publisher.git /tmp/content-publisher

          mkdir -p /tmp/content-publisher/data/posts
          cp "$POST_FILE" /tmp/content-publisher/data/posts/

          cd /tmp/content-publisher
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "📝 New AI post: ${DATE}"
            git push origin main
            echo "✅ Post pushed to content-publisher. Vercel will auto-redeploy."
          else
            echo "Post already exists in content-publisher."
          fi
